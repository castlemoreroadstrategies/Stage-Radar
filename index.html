<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Empower Analysis Desk · Castlemore Road Strategies</title>
    <meta name="description" content="Client-side Analysis dashboard. Includes configurable watchlist." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      :root {
        --bg: #000000;
        --panel: #0b0b0b;
        --panel-2: #141414;
        --border: #2a2a2a;
        --text: #f5f5f0;
        --muted: #8a8578;
        --bull: #4ade80;
        --bull-soft: rgba(74, 222, 128, 0.12);
        --bear: #ef4444;
        --bear-soft: rgba(239, 68, 68, 0.12);
        --warn: #fbbf24;
        --accent: #ff7a00;
        --accent-soft: rgba(255, 122, 0, 0.12);
        --accent-glow: rgba(255, 122, 0, 0.35);
      }
      html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .panel { background: var(--panel); border: 1px solid var(--border); }
      .panel-2 { background: var(--panel-2); border: 1px solid var(--border); }
      .chip { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
      .chip-bull { color: var(--bull); background: var(--bull-soft); border-color: rgba(74, 222, 128, 0.35); }
      .chip-bear { color: var(--bear); background: var(--bear-soft); border-color: rgba(239, 68, 68, 0.35); }
      .chip-warn { color: var(--warn); background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.35); }
      .chip-muted { color: var(--muted); }
      .stage-1 { color: var(--warn); }
      .stage-2 { color: var(--bull); }
      .stage-3 { color: var(--accent); }
      .stage-4 { color: var(--bear); }
      .ticker-card { transition: transform .15s ease, border-color .15s ease, background .15s ease; cursor: pointer; border-radius: 6px; }
      .ticker-card:hover { transform: translateY(-1px); border-color: var(--accent); }
      .ticker-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset, 0 0 20px -8px var(--accent-glow); }
      .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
      .scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
      .grid-bg {
        background-image:
          linear-gradient(rgba(255, 122, 0, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 122, 0, 0.05) 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .btn { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-weight: 500; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; transition: all .15s; font-family: 'JetBrains Mono', monospace; }
      .btn:hover { border-color: var(--accent); color: var(--accent); }
      .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
      .btn-primary:hover { background: #ff9433; color: #000; border-color: #ff9433; }
      .btn-danger:hover { color: var(--bear); border-color: var(--bear); }
      .input { background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: var(--text); }
      .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
      .modal-backdrop { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
      .pulse-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 8px currentColor; }
      @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
      header { position: relative; }
      header::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .6; }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-[var(--border)] grid-bg">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded bg-[var(--accent)] flex items-center justify-center font-bold text-black mono" style="box-shadow: 0 0 16px var(--accent-glow);">C</div>
          <div>
            <h1 class="text-lg font-semibold leading-tight tracking-wide"><span class="text-[var(--accent)]">Empower</span> ANALYSIS DESK</h1>
            <p class="text-[11px] text-[var(--muted)] leading-tight uppercase tracking-[0.15em] mono">Castlemore Road Strategies · DATA Engine</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-2 mr-2 text-xs text-[var(--muted)]">
            <span id="statusDot" class="pulse-dot bg-[var(--bull)]"></span>
            <span id="statusText">Idle</span>
          </div>
          <button id="refreshBtn" class="btn">↻ Refresh</button>
          <button id="settingsBtn" class="btn">⚙ Settings</button>
        </div>
      </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 sm:px-6 py-6 space-y-6">
      <!-- Watchlist controls -->
      <section class="panel rounded-xl p-4 flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2 flex-1 min-w-[260px]">
          <input id="tickerInput" class="input flex-1" placeholder="Add ticker (e.g. XOM, RY.TO, BTC-USD)" />
          <button id="addBtn" class="btn btn-primary">Add</button>
        </div>
        <div class="text-xs text-[var(--muted)]">
          Benchmark: <span class="mono text-[var(--text)]" id="benchmarkLabel">SPY</span>
          · Lookback: <span class="mono text-[var(--text)]" id="lookbackLabel">2y</span>
        </div>
      </section>

      <!-- Grid -->
      <section>
        <div class="flex items-baseline justify-between mb-3">
          <h2 class="text-sm uppercase tracking-wider text-[var(--muted)]">Watchlist</h2>
          <span id="lastUpdated" class="text-xs text-[var(--muted)] mono"></span>
        </div>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
      </section>

      <!-- Detail / Chart -->
      <section class="panel rounded-xl p-4">
        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div>
            <div class="text-xs text-[var(--muted)] uppercase tracking-wider">Selected</div>
            <div class="flex items-center gap-3">
              <h3 id="detailTicker" class="text-2xl font-semibold mono">—</h3>
              <span id="detailStage" class="chip">Stage —</span>
            </div>
          </div>
          <div id="detailMetrics" class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm"></div>
        </div>
        <div class="relative h-[340px] sm:h-[420px]">
          <canvas id="priceChart"></canvas>
        </div>
        <div class="relative h-[120px] mt-2">
          <canvas id="volChart"></canvas>
        </div>
        <div id="detailNotes" class="mt-4 text-xs text-[var(--muted)] leading-relaxed"></div>
      </section>

      <footer class="text-center text-xs text-[var(--muted)] py-6">
        Built for educational use. Data via Yahoo Finance public endpoints through a CORS proxy. Not investment advice. Castlemore Road Strategies 2026.
      </footer>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 z-50 modal-backdrop items-center justify-center p-4" style="display:none">
      <div class="panel rounded-2xl w-full max-w-lg p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold">Settings</h3>
          <button id="closeSettings" class="btn">✕</button>
        </div>
        <div class="space-y-3">
          <label class="block">
            <span class="text-xs text-[var(--muted)] uppercase tracking-wider">CORS Proxy URL</span>
            <input id="proxyInput" class="input w-full mt-1 mono text-xs" />
            <span class="text-[11px] text-[var(--muted)]">Prepended to Yahoo Finance requests. Default works for most users; swap if rate-limited.</span>
          </label>
          <label class="block">
            <span class="text-xs text-[var(--muted)] uppercase tracking-wider">Benchmark Ticker</span>
            <input id="benchmarkInput" class="input w-full mt-1 mono" />
          </label>
          <div class="grid grid-cols-2 gap-3">
            <label class="block">
              <span class="text-xs text-[var(--muted)] uppercase tracking-wider">SMA Period (weeks)</span>
              <input id="smaInput" type="number" min="5" max="100" class="input w-full mt-1 mono" />
            </label>
            <label class="block">
              <span class="text-xs text-[var(--muted)] uppercase tracking-wider">Volume Multiplier</span>
              <input id="volMultInput" type="number" min="1" step="0.1" class="input w-full mt-1 mono" />
            </label>
          </div>
          <label class="block">
            <span class="text-xs text-[var(--muted)] uppercase tracking-wider">History Lookback</span>
            <select id="lookbackInput" class="input w-full mt-1">
              <option value="1y">1 Year</option>
              <option value="2y">2 Years</option>
              <option value="5y">5 Years</option>
              <option value="10y">10 Years</option>
            </select>
          </label>
        </div>
        <div class="flex justify-between pt-2">
          <button id="resetSettings" class="btn btn-danger">Reset defaults</button>
          <div class="flex gap-2">
            <button id="cancelSettings" class="btn">Cancel</button>
            <button id="saveSettings" class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
